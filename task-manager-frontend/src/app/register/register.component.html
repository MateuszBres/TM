<mat-card style="max-width: 400px; margin: 3rem auto; padding: 3rem; ">
    <h2>Zarejestruj się</h2>
    <form [formGroup]="registerForm" (ngSubmit)="register()">
        <mat-form-field>
            <mat-label>E-mail</mat-label>
            <input matInput type="email" formControlName="email" >

            <mat-error *ngIf="registerForm.get('email')?.hasError('required')">
                 Email jest wymagany
            </mat-error>

            <mat-error *ngIf="registerForm.get('email')?.hasError('email')">
                Niepoprawny format email
            </mat-error>
           
        </mat-form-field>

        <mat-form-field>
            <mat-label>Hasło</mat-label>
            <input matInput type="password" formControlName="password">

            <mat-error *ngIf="registerForm.get('password')?.hasError('required')">
                Hasło jest wymagane
            </mat-error>

            <mat-error *ngIf="registerForm.get('password')?.hasError('minlenght')">
                Hasło musi mieć co najmniej 8 znaków     
            </mat-error>

            <mat-error *ngIf="registerForm.get('password')?.hasError('pattern')">
                Hasło musi zawierać dużą litere, cyfre i znak specjalny
            </mat-error>
        </mat-form-field>
        <button style="margin-top: 1rem;" mat-raised-button [disabled]="registerForm.invalid">Zarejestruj się</button>
    </form>
</mat-card>
